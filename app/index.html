<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JB LocalGuard OS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">JB Fin:AI Challenge · 자유주제</p>
          <h1>JB LocalGuard OS</h1>
        </div>
        <div class="status-strip" aria-label="queue summary">
          <div>
            <span id="summary-high">0</span>
            <small>High Risk</small>
          </div>
          <div>
            <span id="summary-pending">0</span>
            <small>Approval</small>
          </div>
          <div>
            <span id="summary-approved">0</span>
            <small>Approved</small>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside class="queue-panel panel" aria-label="case queue">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Case Queue</p>
              <h2>지역 금융 위험</h2>
            </div>
          </div>
          <div id="case-list" class="case-list"></div>
        </aside>

        <section class="main-panel">
          <div class="case-detail panel">
            <div class="detail-head">
              <div>
                <p id="case-affiliate" class="eyebrow"></p>
                <h2 id="case-title"></h2>
              </div>
              <div id="case-status" class="status-pill"></div>
            </div>
            <div class="metrics-row">
              <div class="metric">
                <span>Risk Score</span>
                <strong id="risk-score"></strong>
                <div class="risk-bar"><i id="risk-bar"></i></div>
              </div>
              <div class="metric">
                <span>Primary Pain</span>
                <strong id="primary-pain"></strong>
              </div>
              <div class="metric">
                <span>Next Action</span>
                <strong id="next-action"></strong>
              </div>
            </div>
            <div id="pain-tags" class="tag-row"></div>
            <div class="action-row">
              <button id="run-agents" class="primary-button" type="button">
                <span aria-hidden="true">▶</span>
                Run Agents
              </button>
              <button id="approve-action" class="secondary-button" type="button">
                <span aria-hidden="true">✓</span>
                Approve Action
              </button>
              <button id="reset-case" class="ghost-button" type="button">
                <span aria-hidden="true">↺</span>
                Reset Case
              </button>
            </div>
          </div>

          <div class="split-grid">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Agent Board</p>
                  <h2>전문 Agent</h2>
                </div>
              </div>
              <div id="agent-board" class="agent-board"></div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Skill Rack</p>
                  <h2>장착 스킬</h2>
                </div>
              </div>
              <div id="skill-rack" class="skill-rack"></div>
            </section>
          </div>
        </section>

        <aside class="right-panel">
          <section class="panel evidence-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Evidence Feed</p>
                <h2>근거</h2>
              </div>
            </div>
            <div id="evidence-feed" class="evidence-feed"></div>
          </section>

          <section class="panel audit-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Audit Ledger</p>
                <h2>감사 로그</h2>
              </div>
            </div>
            <div id="audit-log" class="audit-log"></div>
          </section>
        </aside>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
